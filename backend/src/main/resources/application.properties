server.port=${SERVER_PORT:8080}

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stress_monitoring_ai_assistant_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect (optional in newer Hibernate, but safe to keep)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# App Integration Configuration
# ===============================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.emotion.api-url=${APP_EMOTION_API_URL:http://127.0.0.1:8001/predict-emotion}
app.gemini.model=${APP_GEMINI_MODEL:gemini-2.5-flash}
app.gemini.api-key=${GEMINI_API_KEY:}
